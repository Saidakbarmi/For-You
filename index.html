<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="A special romantic interactive surprise, crafted just for you." />
  <meta name="theme-color" content="#f9a8d4" />

  <!-- Open Graph -->
  <meta property="og:title"       content="For You 💕" />
  <meta property="og:description" content="A little something special, made with love." />
  <meta property="og:type"        content="website" />

  <title>For You 💕</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ Floating hearts canvas (background) ══ -->
  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <!-- ══ Confetti canvas (celebration) ══ -->
  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <!-- ══ Rose bloom overlay ══ -->
  <div id="roseOverlay" aria-hidden="true"></div>

  <!-- ══ Toast notification ══ -->
  <div id="responseToast" class="response-toast" role="status" aria-live="polite"></div>

  <!-- ══════════════════════════════════════════════
       APP SHELL
       ══════════════════════════════════════════════ -->
  <main id="app">

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SCREEN 1 — HERO
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="heroScreen" class="screen" aria-label="Welcome screen">

      <!-- Optional romantic photo / avatar -->
      <div class="hero-avatar-wrap">
        <img
          id="heroAvatar"
          class="hero-avatar"
          src=""
          alt="A photo for you"
          onerror="this.style.display='none'"
        />
        <span class="hero-avatar-emoji" aria-hidden="true">🌸</span>
      </div>

      <p class="avatar-upload-hint" id="avatarUploadHint" role="button" tabindex="0"
         title="Click to add a photo">
        + add a photo
      </p>
      <input type="file" id="avatarInput" accept="image/*" aria-label="Upload avatar photo" />

      <h1 id="heroHeadline" class="hero-headline">Something Special</h1>
      <p  id="heroSubtitle"  class="hero-subtitle"></p>

      <button id="heroBtn" class="btn btn-hero" type="button">
        Open Your Surprise ✨
      </button>

    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SCREEN 2 — QUESTION FLOW
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="questionScreen" class="screen" aria-label="Questions">

      <!-- Progress -->
      <div class="progress-wrap" aria-label="Progress indicator">
        <span id="progressLabel" class="progress-label" aria-live="polite">1 / 4</span>
        <div class="progress-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressFill" class="progress-bar-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Card -->
      <article class="question-card" aria-live="polite">
        <span id="questionEmoji" class="question-emoji" aria-hidden="true">🌸</span>
        <h2   id="questionText"  class="question-text">Loading…</h2>
        <div  id="optionsGrid"   class="options-grid" role="group" aria-label="Answer options"></div>
      </article>

    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SCREEN 3 — FINAL
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="finalScreen" class="screen" aria-label="Final message">

      <div class="final-card">
        <div class="final-rose" aria-hidden="true">🌹</div>

        <h2 id="finalHeadline" class="final-headline">You made my heart happy 💖</h2>

        <div class="final-divider" aria-hidden="true"></div>

        <p id="finalMessage" class="final-message"></p>

        <div class="final-actions">
          <button id="finalCtaBtn" class="btn btn-final" type="button">
            Send a Smile 🌸
          </button>
          <button id="restartBtn" class="btn btn-reset" type="button">
            ↩ Start over
          </button>
        </div>
      </div>

    </section>

  </main>



  <!-- ══ Scripts (order matters) ══ -->
  <script src="questions.js"></script>
  <script src="app.js"></script>

</body>
</html>
